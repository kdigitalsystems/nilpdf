<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>LocalPDF - Private PDF Merger</title>
    
    <!-- Link to our external stylesheet -->
    <link rel="stylesheet" href="./assets/css/main.css">
    
    <!-- Load PyScript Engine -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body>

    <div class="container">
        <h2>Merge PDFs Locally</h2>
        <p>100% private. Files never leave your computer.</p>
        
        <div class="file-drop">
            <label>PDF 1: </label>
            <input type="file" id="pdf1" accept="application/pdf">
        </div>
        
        <div class="file-drop">
            <label>PDF 2: </label>
            <input type="file" id="pdf2" accept="application/pdf">
        </div>

        <button id="merge-btn" py-click="handle_merge_click">Merge & Download</button>
        <div id="status">Loading Python Engine...</div>
    </div>

    <!-- Load the TOML configuration -->
    <py-config src="./pyscript.toml"></py-config>

    <!-- Connect the UI to the Python Backend -->
    <script type="py">
        from pyscript import document
        from core.pdf_merger import merge_pdfs

        # Inform user that the WASM engine is ready
        status_div = document.getElementById("status")
        status_div.innerText = "Ready to merge!"
        status_div.className = "text-green"

        # The function triggered by the button click
        async def handle_merge_click(event):
            await merge_pdfs()
    </script>
</body>
</html>
